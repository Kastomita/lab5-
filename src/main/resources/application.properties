# ============================================================================
# SERVER CONFIGURATION WITH HTTPS
# ============================================================================
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:server.jks
server.ssl.key-store-type=JKS
server.ssl.key-store-password=${KEYSTORE_PASSWORD:serverPass}
server.ssl.key-alias=server
server.ssl.key-password=${KEY_PASSWORD:serverPass}

# HTTP port for redirect (optional)
server.http.port=8080

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/photoprinting}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# JPA/HIBERNATE
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================================
# DATA INITIALIZATION
# ============================================================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================================================
# JWT CONFIGURATION (Access + Refresh Tokens)
# ============================================================================
jwt.access.secret=${JWT_ACCESS_SECRET:photo-printing-access-secret-key-minimum-32-characters-long}
jwt.refresh.secret=${JWT_REFRESH_SECRET:photo-printing-refresh-secret-key-minimum-32-characters-long}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:2592000000}

# ============================================================================
# LOGGING
# ============================================================================
logging.level.ru.mfa.photoprinting=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ============================================================================
# OPENAPI/SWAGGER
# ============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.oauth2-redirect-url=https://localhost:8443/swagger-ui/oauth2-redirect.html

# ============================================================================
# ACTUATOR
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always